# Lowered from -Xmx8G to -Xmx2G because this dev machine has 7 GB
# physical RAM and the larger value crashed the Gradle daemon with
# "Native memory allocation (mmap) failed to map 918552576 bytes:
# G1 virtual space" after long-running builds (see hs_err_pid*.log).
# 2 GB heap + 1 GB metaspace fits comfortably with Windows, the IDE,
# and the emulator/adb/etc. running alongside.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
