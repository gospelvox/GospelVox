name: gospel_vox
description: "Gospel Vox — Global Christian Spiritual Consultation Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any

  # State Management
  flutter_bloc: any
  equatable: any

  # Dependency Injection
  get_it: any
  injectable: any

  # Navigation
  go_router: any

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  cloud_functions: any
  firebase_crashlytics: any
  firebase_messaging: any

  # Auth
  google_sign_in: any
  sign_in_with_apple: any

  # Payments
  razorpay_flutter: any

  # Voice Calls
  agora_rtc_engine: any

  # Notifications
  onesignal_flutter: any

  # UI & Fonts
  google_fonts: any
  cached_network_image: any
  shimmer: any

  # Utilities
  connectivity_plus: any
  shared_preferences: any
  intl: any
  image_picker: any
  flutter_image_compress: any
  dartz: any
  uuid: any
  url_launcher: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  injectable_generator: any
  build_runner: any

flutter:
  uses-material-design: true
