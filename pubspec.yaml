name: gospel_vox
description: "Gospel Vox — Global Christian Spiritual Consultation Platform"
publish_to: 'none'
version: 1.3.6+35

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any

  # State Management
  flutter_bloc: any
  equatable: any

  # Dependency Injection
  get_it: any
  injectable: any

  # Navigation
  go_router: any

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  cloud_functions: any
  firebase_crashlytics: any
  firebase_messaging: ^16.2.0

  # Auth
  google_sign_in: any
  sign_in_with_apple: any

  # Payments — all paid surfaces (coins, activation, bible session)
  # flow through Google Play Billing via the in_app_purchase plugin.
  # Android only — iOS purchases are gated until the StoreKit slice
  # ships (the CFs only verify Play tokens today).
  in_app_purchase: ^3.2.0
  # Direct dep on the Android federated plugin so the IAP service
  # can reach InAppPurchaseAndroidPlatformAddition.consumePurchase.
  # The in_app_purchase package pulls this in transitively, but the
  # Dart analyzer (correctly) rejects "implicit transitive" imports —
  # declaring it here makes the import legitimate without changing
  # the resolved version.
  in_app_purchase_android: any

  # Voice Calls
  agora_rtc_engine: any
  # Runtime permission requests (microphone for voice calls). The
  # AndroidManifest already declares RECORD_AUDIO, but Android 6+
  # requires an explicit runtime grant before Agora's mic capture
  # actually works.
  permission_handler: any

  # Notifications
  onesignal_flutter: any

  # UI & Fonts
  google_fonts: any
  cached_network_image: any
  shimmer: any
  flutter_svg: any
  # Lottie (After Effects → JSON) animations. Used for the payment
  # success checkmark; centralised under assets/lottie_asset/.
  lottie: any
  # Premium icon set — pinned major to avoid breaking changes on
  # future upgrades. Centralised mapping lives in
  # lib/core/widgets/app_icons.dart so swapping packs later means
  # editing one file, not 35.
  font_awesome_flutter: ^11.0.0

  # Utilities
  connectivity_plus: any
  shared_preferences: any
  intl: any
  image_picker: any
  flutter_image_compress: any
  # Pure-Dart (no native code) image cropper. Used to add a square
  # crop step after a priest picks a profile photo so portrait shots
  # aren't half-cut by the cover-fit avatar. Chosen over image_cropper
  # specifically because it needs zero AndroidManifest / Gradle / theme
  # changes — it cannot affect the native build.
  crop_your_image: any
  dartz: any
  uuid: any
  url_launcher: any
  flutter_local_notifications: ^21.0.0
  # Native share-sheet integration. Used to share priest profiles
  # out to WhatsApp, Mail, Telegram, etc. — both image + text in a
  # single sheet, so the recipient sees a rich preview rather than
  # a bare URL.
  share_plus: any
  # Temp-directory access for the admin revenue CSV export — the file
  # is written to the cache dir, then handed to share_plus. Already
  # resolved transitively; declared direct so it can be imported
  # without the depend_on_referenced_packages lint.
  path_provider: any
  # Generates the admin revenue export as a real .xlsx workbook
  # (multiple sheets, styled headers, typed number/date cells).
  excel: ^4.0.0
  # Cache-aware file fetcher. Already pulled in transitively by
  # cached_network_image; declared explicitly because the share
  # flow imports DefaultCacheManager directly to grab the already-
  # downloaded priest photo without re-fetching the network bytes.
  flutter_cache_manager: any
  # Inbound deep-link handling. Listens for OS-routed URIs (cold-
  # start via getInitialAppLink, warm via uriLinkStream) so a
  # shared gospelvox://priest/<uid> link opens the profile page
  # straight away inside the running app.
  app_links: any

  # Reads the running app's version + build number off the platform
  # so the About / Settings "Gospel Vox v1.0.0" strings stay in sync
  # with pubspec.yaml automatically. Without this every release ships
  # with a stale hardcoded version string in two places, which Play
  # Store reviewers occasionally flag as a "metadata mismatch".
  package_info_plus: any

  # Audio playback for incoming/outgoing ringtones.
  #
  # We started on just_audio but it uses ExoPlayer on Android, and
  # ExoPlayer's MP3Extractor sniff routine rejected the user's
  # 48 kHz/256 kbps custom ringtone with UnrecognizedInputFormatException
  # on a Samsung A05M (and reportedly other handsets). Same MP3
  # plays cleanly through Android's system MediaPlayer.
  #
  # audioplayers uses MediaPlayer on Android by default, which
  # accepts a much wider range of MP3 encodings without re-encoding
  # the user's source file. The ring is always stopped before
  # Agora's playAndRecord session takes over the audio device, so
  # the original concern about audio-session conflicts doesn't
  # actually materialise in practice.
  audioplayers: ^6.1.0
  country_picker: ^2.0.28
  phone_numbers_parser: ^9.0.23

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  injectable_generator: any
  build_runner: any
  # Generates app launcher icons for Android + iOS from a single
  # source PNG. Run `dart run flutter_launcher_icons` after changing
  # the source image to regenerate every density/size variant.
  flutter_launcher_icons: any

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audio/
    - assets/bible_banners/
    - assets/coins_images/
    - assets/lottie_asset/
    - assets/images/onboarding/

# Launcher icon config (new GospelVox badge logo, 1024x1024 source).
# flutter_launcher_icons rescales it for every Android mipmap density
# + every iOS size.
#
#  - image_path: the full-bleed badge — used for iOS (rounded-rect, no
#    clipping) and the Android legacy/square icon. Fills the tile.
#  - adaptive_icon_foreground: a PADDED copy (badge shrunk to ~72% on a
#    beige canvas) so the overhanging book is NOT clipped by the round/
#    squircle adaptive mask on Pixel/Samsung launchers.
#  - adaptive_icon_background: #E8D4B0 — sampled from the logo's own
#    beige so the masked corners blend seamlessly (the old #F4EDE3 did
#    NOT match this artwork and would show a beige-on-beige ring).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/gospelvox_launcher_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E8D4B0"
  adaptive_icon_foreground: "assets/gospelvox_adaptive_foreground.png"
  # iOS rejects icons with an alpha channel, so flatten here
  # rather than manually editing the PNG.
  remove_alpha_ios: true
