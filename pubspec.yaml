name: gospel_vox
description: "Gospel Vox — Global Christian Spiritual Consultation Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any

  # State Management
  flutter_bloc: any
  equatable: any

  # Dependency Injection
  get_it: any
  injectable: any

  # Navigation
  go_router: any

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  cloud_functions: any
  firebase_crashlytics: any
  firebase_messaging: ^16.2.0

  # Auth
  google_sign_in: any
  sign_in_with_apple: any

  # Payments
  razorpay_flutter: any

  # Voice Calls
  agora_rtc_engine: any
  # Runtime permission requests (microphone for voice calls). The
  # AndroidManifest already declares RECORD_AUDIO, but Android 6+
  # requires an explicit runtime grant before Agora's mic capture
  # actually works.
  permission_handler: any

  # Notifications
  onesignal_flutter: any

  # UI & Fonts
  google_fonts: any
  cached_network_image: any
  shimmer: any
  flutter_svg: any
  # Premium icon set — pinned major to avoid breaking changes on
  # future upgrades. Centralised mapping lives in
  # lib/core/widgets/app_icons.dart so swapping packs later means
  # editing one file, not 35.
  font_awesome_flutter: ^11.0.0

  # Utilities
  connectivity_plus: any
  shared_preferences: any
  intl: any
  image_picker: any
  flutter_image_compress: any
  dartz: any
  uuid: any
  url_launcher: any
  flutter_local_notifications: ^21.0.0
  # Native share-sheet integration. Used to share priest profiles
  # out to WhatsApp, Mail, Telegram, etc. — both image + text in a
  # single sheet, so the recipient sees a rich preview rather than
  # a bare URL.
  share_plus: any
  # Cache-aware file fetcher. Already pulled in transitively by
  # cached_network_image; declared explicitly because the share
  # flow imports DefaultCacheManager directly to grab the already-
  # downloaded priest photo without re-fetching the network bytes.
  flutter_cache_manager: any
  # Inbound deep-link handling. Listens for OS-routed URIs (cold-
  # start via getInitialAppLink, warm via uriLinkStream) so a
  # shared gospelvox://priest/<uid> link opens the profile page
  # straight away inside the running app.
  app_links: any

  # Audio playback for incoming/outgoing ringtones.
  #
  # We started on just_audio but it uses ExoPlayer on Android, and
  # ExoPlayer's MP3Extractor sniff routine rejected the user's
  # 48 kHz/256 kbps custom ringtone with UnrecognizedInputFormatException
  # on a Samsung A05M (and reportedly other handsets). Same MP3
  # plays cleanly through Android's system MediaPlayer.
  #
  # audioplayers uses MediaPlayer on Android by default, which
  # accepts a much wider range of MP3 encodings without re-encoding
  # the user's source file. The ring is always stopped before
  # Agora's playAndRecord session takes over the audio device, so
  # the original concern about audio-session conflicts doesn't
  # actually materialise in practice.
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  injectable_generator: any
  build_runner: any
  # Generates app launcher icons for Android + iOS from a single
  # source PNG. Run `dart run flutter_launcher_icons` after changing
  # the source image to regenerate every density/size variant.
  flutter_launcher_icons: any

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audio/
    - assets/bible_banners/
    - assets/coins_images/

# Launcher icon config. Source is the 512x512 Play Store graphic —
# flutter_launcher_icons rescales it for every Android mipmap
# density + every iOS size. On Android 8+ the adaptive icon uses
# the same graphic as its foreground on a warm beige background
# (AppColors.background = #F4EDE3) so the logo sits inside the
# round/squircle mask without an ugly white halo on Pixel launchers.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icons/play_store_512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F4EDE3"
  adaptive_icon_foreground: "icons/play_store_512.png"
  # iOS rejects icons with an alpha channel, so flatten here
  # rather than manually editing the PNG.
  remove_alpha_ios: true
