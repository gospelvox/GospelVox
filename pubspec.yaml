name: gospel_vox
description: "Gospel Vox — Global Christian Spiritual Consultation Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: any

  # State Management
  flutter_bloc: any
  equatable: any

  # Dependency Injection
  get_it: any
  injectable: any

  # Navigation
  go_router: any

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  cloud_functions: any
  firebase_crashlytics: any
  firebase_messaging: any

  # Auth
  google_sign_in: any
  sign_in_with_apple: any

  # Payments
  razorpay_flutter: any

  # Voice Calls
  agora_rtc_engine: any
  # Runtime permission requests (microphone for voice calls). The
  # AndroidManifest already declares RECORD_AUDIO, but Android 6+
  # requires an explicit runtime grant before Agora's mic capture
  # actually works.
  permission_handler: any

  # Notifications
  onesignal_flutter: any

  # UI & Fonts
  google_fonts: any
  cached_network_image: any
  shimmer: any

  # Utilities
  connectivity_plus: any
  shared_preferences: any
  intl: any
  image_picker: any
  flutter_image_compress: any
  dartz: any
  uuid: any
  url_launcher: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  injectable_generator: any
  build_runner: any
  # Generates app launcher icons for Android + iOS from a single
  # source PNG. Run `dart run flutter_launcher_icons` after changing
  # the source image to regenerate every density/size variant.
  flutter_launcher_icons: any

flutter:
  uses-material-design: true

# Launcher icon config. Source is the 512x512 Play Store graphic —
# flutter_launcher_icons rescales it for every Android mipmap
# density + every iOS size. On Android 8+ the adaptive icon uses
# the same graphic as its foreground on a warm beige background
# (AppColors.background = #F4EDE3) so the logo sits inside the
# round/squircle mask without an ugly white halo on Pixel launchers.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icons/play_store_512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F4EDE3"
  adaptive_icon_foreground: "icons/play_store_512.png"
  # iOS rejects icons with an alpha channel, so flatten here
  # rather than manually editing the PNG.
  remove_alpha_ios: true
